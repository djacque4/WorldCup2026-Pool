<!DOCTYPE html>
<html lang='en">
  <head> 
  <meta charset="UTF-8">
    <title>Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #404040;
        }
        
        /*title image banner*/
        #title-image {
            background-image: linear-gradient(rgba(0,25,0,0.5), rgba(0,25,0,0.5)), url("images/banner-image.jpg");
            height: 50vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
            
            text-align: left;
            padding: 70px;
            background-color: #676767;
        }

        #title-text h1 {
            font-family: "Inter", sans-serif;
            font-size: clamp(0px,15vw,100px);
            max-width: 100px;
            color: white;
        }

        #title-text h3 {
            font-family: "Inter", sans-serif;
            font-size: clamp(0px,5vw,50px);
            color: #d0d0d0;
        }
        
        #join-button {
            font-family: "Inter", sans-serif;
            background-color: transparent;
            border: solid;
            border-color: white;
            color: white;
            padding: 10px;
            margin-top: 50px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            transition: 0.5s;
        }
        
        #join-button:hover {
            border-color: #1c7b20;
            background-color: #1c7b20;
        }

        /*who are we explanation*/
        #who-are-we {
            background-color: white;
            padding: 50px 15px;
            text-align: center;
        }
        
        #who-are-we h2 {
            font-family: "Inter", sans-serif;
            font-size: 30px;
            margin-bottom: 10px;
        }

        #who-are-we p {
            font-family: "Inter", sans-serif;
            font-size: 20px;
            line-height: 30px;
        }
        #who-are-we #learn-about-first {
            font-family: "Inter", sans-serif;
            background-color: transparent;
            border: solid;
            border-color: #1c7b20;
            color: #1c7b20;
            padding: 10px;
            margin-top: 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            transition: 0.5s;
        }
        
        #who-are-we #learn-about-first:hover {
            color: #e2e2e2;
            background-color: #1c7b20;
        }
        
        /*image carousel*/
        #image-carousel {
            background-color: #162b17;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0));
            box-sizing: border-box;
            padding: 10px;
        }
        
        #image-slides {
            max-width: 1000px;
            position: relative;
            margin: auto;
        }
        
        .carousel-slides {
            display: none;
        }
        
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            margin-top: -22px;
            padding: 16px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.5s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
        }
        
        .next {
          right: 0;
          border-radius: 3px 0 0 3px;
        }

        .prev:hover, .next:hover {
          background-color: rgba(0,0,0,0.8);
        }

        .image-number {
          font-family: "Inter", sans-serif;
          color: #f2f2f2;
          font-size: 12px;
          padding: 8px 12px;
          position: absolute;
          top: 0;
        }
        
        .dot {
          cursor: pointer;
          height: 15px;
          width: 15px;
          margin: 0 2px;
          margin-top: 10px;
          background-color: #bbb;
          border-radius: 50%;
          display: inline-block;
          transition: background-color 0.5s ease;
        }

        .active, .dot:hover {
          background-color: #717171;
        }

        .fade {
          animation-name: fade;
          animation-duration: 1.5s;
        }

        @keyframes fade {
          from {opacity: .4}
          to {opacity: 1}
        }
        
        /*contact form*/
        #send-message {
            background-color: white;
            padding: 50px 15px;
            text-align: center;
        }
        
        #send-message h2 {
            font-family: "Inter", sans-serif;
            font-size: 30px;
            margin: 10px 0px;
        }

        #send-message h3 {
            font-family: "Inter", sans-serif;
            font-size: 20px;
            margin: 10px 0px;
        }
        
        input[type=text], select, textarea {
            font-family: "Inter", sans-serif;
            background-color: white;
            border: solid;
            border-color: #1c7b20;
            color: #1c7b20;
            padding: 10px;
            margin-bottom: 10px;
            text-align: left;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            width: calc(100% - 26px);
            resize: vertical;
        }

        input[type=email], select, textarea {
            font-family: "Inter", sans-serif;
            background-color: white;
            border: solid;
            border-color: #1c7b20;
            color: #1c7b20;
            padding: 10px;
            margin-bottom: 10px;
            text-align: left;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            width: calc(100% - 26px);
        }
        
        input[type=submit] {
            font-family: "Inter", sans-serif;
            background-color: white;
            border: solid;
            border-color: #1c7b20;
            color: #1c7b20;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            transition: 0.5s;
        }
        
        input[type=submit]:hover {
            background-color: #1c7b20;
            color: white;
        }
    </style>

  </head>
  <body> </body>
  
</html>
